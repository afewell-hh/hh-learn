resources:
  # CloudFormation condition: shadow-only resources gated on stage == shadow
  Conditions:
    IsShadowStage: !Equals ['${sls:stage}', 'shadow']

  Resources:
    # -------------------------------------------------------------------------
    # Shadow Completion Framework Tables (Issue #405 / #397)
    # Condition: IsShadowStage — only provisioned when sls:stage == shadow
    # -------------------------------------------------------------------------

    # Stores current task status per learner per task (mutable, updated on each attempt)
    # PK: USER#<userId>  SK: TASK#MODULE#<moduleSlug>#<taskSlug>
    TaskRecordsShadowTable:
      Type: AWS::DynamoDB::Table
      Condition: IsShadowStage
      Properties:
        TableName: ${self:service}-task-records-shadow
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: shadow
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: completion-framework

    # Immutable append-only record of every task attempt (quiz answers, lab attestations)
    # PK: USER#<userId>  SK: ATTEMPT#MODULE#<moduleSlug>#<taskSlug>#<isoTimestamp>
    TaskAttemptsShadowTable:
      Type: AWS::DynamoDB::Table
      Condition: IsShadowStage
      Properties:
        TableName: ${self:service}-task-attempts-shadow
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: shadow
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: completion-framework

    # Module-level completion status derived from task records (one record per learner per module)
    # PK: USER#<userId>  SK: COMPLETION#MODULE#<moduleSlug>
    EntityCompletionsShadowTable:
      Type: AWS::DynamoDB::Table
      Condition: IsShadowStage
      Properties:
        TableName: ${self:service}-entity-completions-shadow
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: shadow
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: completion-framework

    # Issued certificates for module and course completion (one record per learner per entity)
    # PK: USER#<userId>  SK: CERT#<entityType>#<entitySlug>
    # GSI certId-index: certId → used for public certificate verification (Issue #427)
    CertificatesShadowTable:
      Type: AWS::DynamoDB::Table
      Condition: IsShadowStage
      Properties:
        TableName: ${self:service}-certificates-shadow
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: certId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: certId-index
            KeySchema:
              - AttributeName: certId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: shadow
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: certificate-framework

    # -------------------------------------------------------------------------
    # Shadow API path mapping on api.hedgehog.cloud (Issue #421)
    #
    # Creates /shadow base-path on the existing api.hedgehog.cloud custom domain.
    # This lets browser pages on hedgehog.cloud call shadow task endpoints at
    # https://api.hedgehog.cloud/shadow/tasks/... using credentials:'include'.
    # The host-only SameSite=Strict cookie set by api.hedgehog.cloud is sent
    # because the request host matches — no Domain attribute change required.
    #
    # API Gateway strips the /shadow prefix before the Lambda sees the path,
    # so all existing index.ts route matching works unchanged.
    #
    # Condition: IsShadowStage — only created when deploying the shadow stage.
    # The custom domain itself (api.hedgehog.cloud) is managed outside this stack.
    # -------------------------------------------------------------------------
    ShadowApiPathMapping:
      Type: AWS::ApiGatewayV2::ApiMapping
      Condition: IsShadowStage
      Properties:
        ApiId: !Ref HttpApi
        DomainName: api.hedgehog.cloud
        Stage: '$default'
        ApiMappingKey: shadow

    # DynamoDB Tables for External SSO + Progress Store (Issue #302)
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-users-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: ${sls:stage}
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: external-sso

    EnrollmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-enrollments-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: ${sls:stage}
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: external-sso

    ProgressTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-progress-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: ${sls:stage}
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: external-sso

    BadgesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-badges-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Project
            Value: hedgehog-learn
          - Key: Environment
            Value: ${sls:stage}
          - Key: ManagedBy
            Value: serverless-framework
          - Key: Component
            Value: external-sso

    # CloudWatch Logs - 30 day retention for MVP launch
    ApiLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${sls:stage}-api
        RetentionInDays: 30

    # Lambda error alarm (sum of Errors in 1-minute periods)
    ApiLambdaErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-lambda-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: { Ref: ApiLambdaFunction }
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # Lambda throttles alarm (any throttle within 5 minutes)
    ApiLambdaThrottlesAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-lambda-throttles
        Namespace: AWS/Lambda
        MetricName: Throttles
        Dimensions:
          - Name: FunctionName
            Value: { Ref: ApiLambdaFunction }
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 5
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # API Gateway 5XX errors (HTTP API)
    ApiGateway5xxAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-httpapi-5xx
        Namespace: AWS/ApiGateway
        MetricName: 5XXError
        Dimensions:
          - Name: ApiId
            Value: { Ref: HttpApi }
          - Name: Stage
            Value: "$default"
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # API Gateway latency (average > 1s over 5 minutes)
    ApiGatewayLatencyAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-httpapi-latency
        Namespace: AWS/ApiGateway
        MetricName: Latency
        Dimensions:
          - Name: ApiId
            Value: { Ref: HttpApi }
          - Name: Stage
            Value: "$default"
        Statistic: Average
        Period: 60
        EvaluationPeriods: 5
        Threshold: 1000
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # Composite alarm: page when any of the above are ALARM
    ApiErrorCompositeAlarm:
      Type: AWS::CloudWatch::CompositeAlarm
      DependsOn:
        - ApiLambdaErrorsAlarm
        - ApiLambdaThrottlesAlarm
        - ApiGateway5xxAlarm
        - ApiGatewayLatencyAlarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-api-red
        AlarmRule:
          Fn::Sub: "ALARM(arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-${sls:stage}-lambda-errors) OR ALARM(arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-${sls:stage}-httpapi-5xx) OR ALARM(arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-${sls:stage}-lambda-throttles) OR ALARM(arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${self:service}-${sls:stage}-httpapi-latency)"
