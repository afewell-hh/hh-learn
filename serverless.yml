service: hedgehog-learn
frameworkVersion: "3"

# Stage-specific params — shadow gets real table names; all other stages get empty string
# so the completion framework env vars carry no table references outside shadow.
params:
  shadow:
    taskRecordsTable: ${self:service}-task-records-shadow
    taskAttemptsTable: ${self:service}-task-attempts-shadow
    entityCompletionsTable: ${self:service}-entity-completions-shadow
    certificatesTable: ${self:service}-certificates-shadow
  default:
    taskRecordsTable: ''
    taskAttemptsTable: ''
    entityCompletionsTable: ''
    certificatesTable: ''

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${env:APP_STAGE, 'dev'}
  environment:
    HUBSPOT_PROJECT_ACCESS_TOKEN: ${env:HUBSPOT_PROJECT_ACCESS_TOKEN, ''}
    HUBSPOT_API_TOKEN: ${env:HUBSPOT_API_TOKEN, ''}
    HUBSPOT_PRIVATE_APP_TOKEN: ${env:HUBSPOT_PRIVATE_APP_TOKEN}
    HUBSPOT_ACCOUNT_ID: ${env:HUBSPOT_ACCOUNT_ID}
    ENABLE_CRM_PROGRESS: ${env:ENABLE_CRM_PROGRESS, 'false'}
    PROGRESS_BACKEND: ${env:PROGRESS_BACKEND, 'properties'}
    JWT_SECRET: ${env:JWT_SECRET}
    # DynamoDB table names for External SSO + Progress Store (Issue #302)
    DYNAMODB_USERS_TABLE: ${self:service}-users-${sls:stage}
    DYNAMODB_ENROLLMENTS_TABLE: ${self:service}-enrollments-${sls:stage}
    DYNAMODB_PROGRESS_TABLE: ${self:service}-progress-${sls:stage}
    DYNAMODB_BADGES_TABLE: ${self:service}-badges-${sls:stage}
    # Cognito configuration for External SSO (Issue #303)
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    COGNITO_DOMAIN: ${env:COGNITO_DOMAIN}
    COGNITO_REGION: ${env:COGNITO_REGION, env:AWS_REGION}
    COGNITO_REDIRECT_URI: ${env:COGNITO_REDIRECT_URI}
    COGNITO_ISSUER: ${env:COGNITO_ISSUER}
    ENABLE_TEST_BYPASS: ${env:ENABLE_TEST_BYPASS, 'false'}
    APP_STAGE: ${env:APP_STAGE, 'dev'}
    HUBDB_MODULES_TABLE_ID: ${env:HUBDB_MODULES_TABLE_ID}
    HUBDB_COURSES_TABLE_ID: ${env:HUBDB_COURSES_TABLE_ID, ''}
    # Shadow completion framework tables (Issue #405 / #397)
    # Values resolve to the table names only when stage=shadow (via params block above);
    # all other stages receive empty string — table names never injected into dev/prod runtime.
    TASK_RECORDS_TABLE: ${param:taskRecordsTable}
    TASK_ATTEMPTS_TABLE: ${param:taskAttemptsTable}
    ENTITY_COMPLETIONS_TABLE: ${param:entityCompletionsTable}
    # Shadow certificate table (Issue #427)
    CERTIFICATES_TABLE: ${param:certificatesTable}
  iam:
    role:
      statements:
        # DynamoDB access for External SSO + Progress Store (Issue #302)
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt: [UsersTable, Arn]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [UsersTable, Arn]
                - 'index/*'
            - Fn::GetAtt: [EnrollmentsTable, Arn]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [EnrollmentsTable, Arn]
                - 'index/*'
            - Fn::GetAtt: [ProgressTable, Arn]
            - Fn::GetAtt: [BadgesTable, Arn]
        # Shadow completion framework tables (Issue #405 / #397)
        # ARNs hardcoded (not Fn::GetAtt) so this statement deploys to all stages safely;
        # tables themselves are Condition: IsShadowStage and only exist in the shadow stack
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-task-records-shadow"
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-task-attempts-shadow"
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-entity-completions-shadow"
            # Shadow certificate table + certId-index GSI (Issue #427)
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-certificates-shadow"
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${self:service}-certificates-shadow/index/*"
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminInitiateAuth
          Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${env:COGNITO_USER_POOL_ID}"
  httpApi:
    cors:
      allowedOrigins:
        - 'https://hedgehog.cloud'
        - 'https://www.hedgehog.cloud'
      allowedHeaders:
        - Content-Type
        - Authorization
        - Origin
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowCredentials: true

functions:
  api:
    handler: dist-lambda/src/api/lambda/index.handler
    events:
      # Cognito OAuth endpoints (Issue #303)
      - httpApi:
          path: /auth/login
          method: GET
      - httpApi:
          path: /auth/signup
          method: GET
      - httpApi:
          path: /auth/callback
          method: GET
      - httpApi:
          path: /auth/logout
          method: GET
      - httpApi:
          path: /auth/logout
          method: POST
      - httpApi:
          path: /auth/me
          method: GET
      - httpApi:
          path: /auth/check-email
          method: GET
      - httpApi:
          path: /auth/claim
          method: POST
      # Legacy endpoints
      - httpApi:
          path: /auth/login
          method: POST
      - httpApi:
          path: /events/track
          method: POST
      - httpApi:
          path: /quiz/grade
          method: POST
      - httpApi:
          path: /progress/read
          method: GET
      - httpApi:
          path: /progress/aggregate
          method: GET
      - httpApi:
          path: /enrollments/list
          method: GET
      # Shadow completion framework endpoints (Issue #397)
      - httpApi:
          path: /tasks/quiz/submit
          method: POST
      - httpApi:
          path: /tasks/lab/attest
          method: POST
      - httpApi:
          path: /tasks/status
          method: GET
      - httpApi:
          path: /tasks/status/batch
          method: GET
      - httpApi:
          path: /admin/test/reset
          method: POST
      # Shadow certificate verification endpoint (Issue #427)
      - httpApi:
          path: /shadow/certificate/{certId}
          method: GET
      # Shadow certificates list endpoint (Issue #429)
      # Accessible via api.hedgehog.cloud/shadow/certificates (base-path mapping strips /shadow)
      - httpApi:
          path: /certificates
          method: GET

package:
  individually: true
  patterns:
    # Include ONLY compiled lambda code from dist-lambda
    - 'dist-lambda/src/api/**'
    - 'dist-lambda/src/shared/**'

    # Include only minimal runtime dependencies
    - 'node_modules/@hubspot/api-client/lib/**/*.js'
    - '!node_modules/@hubspot/api-client/**/*.d.ts'
    - '!node_modules/@hubspot/api-client/**/*.map'
    - 'node_modules/@hubspot/api-client/package.json'

    - 'node_modules/bottleneck/**/*.js'
    - '!node_modules/bottleneck/**/*.d.ts'
    - '!node_modules/bottleneck/**/*.map'
    - 'node_modules/bottleneck/package.json'

    - 'node_modules/es6-promise/dist/**/*.js'
    - '!node_modules/es6-promise/dist/**/*.map'
    - 'node_modules/es6-promise/package.json'

    - 'node_modules/form-data/**/*.js'
    - 'node_modules/form-data/package.json'

    - 'node_modules/lodash.get/**/*.js'
    - 'node_modules/lodash.get/package.json'

    - 'node_modules/lodash.merge/**/*.js'
    - 'node_modules/lodash.merge/package.json'

    - 'node_modules/node-fetch/**/*.js'
